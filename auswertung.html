<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
    <title>Meine Fangübersicht</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f5f5; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 100%; margin: 0 auto; }
        .header-bereich { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 15px auto; padding: 0 10px; flex-wrap: wrap; gap: 10px; }
        .header-links { display: flex; align-items: center; gap: 15px; }
        h2 { color: #2e6f40; margin: 0; font-size: 20px; }
        
        /* Button für den Bearbeitungsmodus */
        .btn-edit-toggle { background-color: #d68c45; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-edit-toggle:active { background-color: #a06530; }
        
        .user-info { font-size: 13px; color: #666; background: #e8ede9; padding: 6px 12px; border-radius: 20px; border: 1px solid #cbdad0; }
        .tabellen-container { background: white; border-radius: 8px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; white-space: nowrap; }
        thead tr { background: #333; color: white; }
        th, td { padding: 10px 12px; border-bottom: 1px solid #eee; }
        tbody tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* Die Stift-Spalte ist standardmäßig unsichtbar */
        .edit-col { display: none; width: 40px; text-align: center; font-size: 16px; cursor: pointer; user-select: none; }
        
        .zurueck-link { display: block; text-align: center; margin-top: 25px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bereich">
        <div class="header-links">
            <h2>📊 Meine Fangübersicht</h2>
            <button id="edit-toggle-btn" class="btn-edit-toggle" onclick="toggleEditMode()">✏️ Ändern</button>
        </div>
        <div class="user-info">Angler: <span id="angler-name">Lade...</span></div>
    </div>

    <div class="tabellen-container">
        <table>
            <thead>
                <tr>
                    <th class="edit-col">Aktion</th>
                    <th>Datum</th>
                    <th>Uhrzeit</th>
                    <th>Fischart</th>
                    <th>Länge</th>
                    <th>Gewicht</th> 
                    <th>Fangort</th>
                    <th>Verbleib</th>
                    <th>Wetter</th>
                    <th>Luftdruck</th>
                    <th>Trübung</th>
                    <th>Notiz</th>
                </tr>
            </thead>
            <tbody id="fang-tabelle-body">
                <tr><td colspan="13" style="text-align: center; padding: 20px;">Prüfe Anmeldung...</td></tr>
            </tbody>
        </table>
    </div>

    <a href="index.html" class="zurueck-link">⬅ Zurück zum Dashboard</a>
</div>

<script src="auswertung.js"></script>  

</body>
</html>
