<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASV Langschede Fangbuch</title>
    <!-- Supabase Client Bibliothek laden -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e8f5e9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        h2 { color: #2e7d32; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; background-color: #2e7d32; color: white; font-size: 16px; cursor: pointer; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="app" class="container">
    <!-- DIE GELBE BOX SITZT JETZT PERFEKT HIER IM WEISSEN KASTEN GANZ OBEN -->
    <div id="sync-status" style="display: none; background-color: #fff9c4; color: #f57f17; padding: 12px; margin: 0 0 15px 0; border-radius: 8px; text-align: center; font-weight: bold; border: 1px solid #fbc02d; font-size: 14px;"></div>
</div>

<script src="Index.js"></script>
</body>
</html>
<div id="sync-status" style="display: none; background-color: #d68c45; color: white; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: bold; text-align: center; margin: 10px auto; max-width: 320px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
    ⚠️ Fänge warten auf Internetverbindung...
</div>

<script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Offline-Manager aktiv!', reg))
                    .catch(err => console.error('Offline-Manager Fehler:', err));
            });
        }
    </script>
</body>
</html>
